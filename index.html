<!DOCTYPE html>
<html>
<head>
    <title>SPCET Admission Form</title>
</head>
<body>
<header>
    <div class="logo-section">
        <img class="logo" src="College-logo.png">
        <div>
            <h1 class="title">St.Peter's College of Engineering and Technology</h1>
            <p class="sub-text">An Autonomous Institution | Approved by NAAC</p>
        </div>
    </div>
    <h5 class="note">Welcome to SPCET</h5>
</header>

<form id="myForm" onsubmit="return validateForm(event)">

<div class="form-wrapper">
    <div class="container">
        <h2>Candidate Details</h2>

        <label>Name</label>
        <input type="text" id="name">

        <label>Email</label>
        <input type="text" id="email">

        <label>Mobile</label>
        <input type="text" id="mobile">

        <label>Gender</label>
        <select id="gender">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>School</label>
        <input type="text" id="school">

        <label>12th Roll No</label>
        <input type="text" id="rollNum12">

        <label>12th Marks</label>
        <input type="number" id="marks12">

        <label>10th Roll No</label>
        <input type="text" id="rollNum10">

        <label>10th Marks</label>
        <input type="number" id="marks10">
    </div>

    <div class="container">
        <h2>Parents Details</h2>

        <label>Father Name</label>
        <input type="text" id="fatherName">

        <label>Father Occupation</label>
        <input type="text" id="fatherOccupation">

        <label>Father Income</label>
        <input type="number" id="fatherIncome">

        <label>Father Mobile</label>
        <input type="text" id="fatherMobile">

        <label>Mother Name</label>
        <input type="text" id="motherName">

        <label>Mother Occupation</label>
        <input type="text" id="motherOccupation">

        <label>Mother Income</label>
        <input type="number" id="motherIncome">

        <label>Mother Mobile</label>
        <input type="text" id="motherMobile">
    </div>

</div>

<div class="password-section">
    <h2>Account Security</h2>

    <label>Password</label>
    <input type="password" id="password">

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword">

    <input type="submit" value="Submit">
</div>

</form>

<script>
function validateForm(event) {
    event.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let gender = document.getElementById("gender").value;
    let school = document.getElementById("school").value.trim();
    let marks12 = document.getElementById("marks12").value;
    let marks10 = document.getElementById("marks10").value;
    let fatherMobile = document.getElementById("fatherMobile").value.trim();
    let motherMobile = document.getElementById("motherMobile").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    if (name === "") return alert("Enter name"), false;

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
        return alert("Invalid email"), false;

    if (!/^\d{10}$/.test(mobile))
        return alert("Invalid mobile"), false;

    if (gender === "")
        return alert("Select gender"), false;

    if (school === "")
        return alert("Enter school"), false;

    if (marks12 === "" || marks12 > 600)
        return alert("Invalid 12th marks"), false;

    if (marks10 === "" || marks10 > 500)
        return alert("Invalid 10th marks"), false;

    if (!/^\d{10}$/.test(fatherMobile) || !/^\d{10}$/.test(motherMobile))
        return alert("Invalid parent mobile"), false;

    if (password.length < 6)
        return alert("Password too short"), false;

    if (password !== confirmPassword)
        return alert("Passwords do not match"), false;

    alert("Form submitted successfully!");
    document.getElementById("myForm").reset();
    return true;
}
</script>

</body>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #0f0010;
}

.logo-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    border: double #ff47ea;
    padding: 10px;
}

.logo {
    height: 100px;
    width: 80px;
}

.title {
    color: #f0a4e7;
    text-align: center;
}

.sub-text {
    font-size: 12px;
    color: #f0a4e7;
    text-align: center;
    margin-top: -10px;
}

.note {
    color: #f0a4e7;
    text-align: center;
}

.form-wrapper {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.container {
    background-color: #e9e3e6;
    padding: 20px;
    border-radius: 8px;
    width: 400px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.password-section {
    background-color: #e9e3e6;
    padding: 20px;
    border-radius: 8px;
    width: 400px;
    margin: 30px auto;
    text-align: center;
    border: 2px solid #ff47ea;
}

input, select {
    width: 97%;
    padding: 8px;
    margin: 6px 0 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

h2 {
    text-align: center;
    color: #3c0313;
}

input[type="submit"] {
    background-color: #34072f;
    color: white;
    cursor: pointer;
}

input[type="submit"]:hover {
    background-color: #1d6d0d;
}
</style>
</html>
